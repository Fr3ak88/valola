<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valola Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">Valola</div>
            <ul>
                <li><a href="index.html#home">Start</a></li>
                <li><a href="index.html#features">Features</a></li>
                <li><a href="index.html#about">Über uns</a></li>
                <li><a href="index.html#contact">Kontakt</a></li>
                <li><a href="login.html" class="active">Login</a></li>
            </ul>
        </nav>
    </header>

    <main class="login-page">
        <div class="login-container">
            <h1>Anmeldung</h1>
            <p>Bitte melden Sie sich an, um auf Ihr Valola-Konto zuzugreifen.</p>
            <form id="loginForm">
                <label for="email">E-Mail</label>
                <input type="email" id="email" name="email" placeholder="admin@valola.com" value="admin@valola.com" required>

                <label for="password">Passwort</label>
                <input type="password" id="password" name="password" placeholder="admin123" value="admin123" required>

                <button type="submit" id="submitBtn">Einloggen</button>
            </form>
            <p class="helper-text">Noch keinen Zugang? <a href="index.html#contact">Kontaktieren Sie uns</a>.</p>
            <div id="result"></div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Valola. Alle Rechte vorbehalten.</p>
    </footer>

    <script>
        async function testLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const submitBtn = document.getElementById('submitBtn');
            const result = document.getElementById('result');
            const API_BASE = 'http://localhost:3001/api';

            result.textContent = 'Lädt...';
            result.style.backgroundColor = '#fff3cd';
            submitBtn.disabled = true;
            submitBtn.textContent = 'Lädt...';

            try {
                const response = await fetch(`${API_BASE}/users/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email, password })
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`HTTP ${response.status}: ${errorText}`);
                }

                const data = await response.json();
                result.textContent = `✅ Login erfolgreich! Willkommen, ${data.user.first_name || data.user.email}!`;
                result.style.backgroundColor = '#d4edda';
                result.style.color = '#155724';

                localStorage.setItem('authToken', data.token);

                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 2000);
            } catch (error) {
                console.error('Login-Fehler:', error);
                result.textContent = `❌ Login fehlgeschlagen: ${error.message}`;
                result.style.backgroundColor = '#f8d7da';
                result.style.color = '#721c24';
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Einloggen';
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            const form = document.getElementById('loginForm');
            if (form) {
                form.addEventListener('submit', function(e) {
                    e.preventDefault();
                    testLogin();
                });
            }
        });
    </script>
</body>
</html>
